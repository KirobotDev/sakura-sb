    <style>

        /* --- CONFIGURATION NAVBAR --- */
        .main-nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 70px;
            background: rgba(2, 3, 5, 0.85); /* Fond sombre semi-transparent */
            backdrop-filter: blur(12px);    /* Effet de flou derrière la barre */
            border-bottom: 1px solid rgba(255, 183, 197, 0.15);
            z-index: 10000;
            display: flex;
            align-items: center;
        }

        .nav-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Orbitron', sans-serif;
            color: var(--sakura);
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .nav-logo img {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--sakura);
            box-shadow: 0 0 10px rgba(255, 183, 197, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 35px;
        }

        .nav-item {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            transition: 0.3s;
            position: relative;
            padding: 5px 0;
        }

        /* Animation du trait sous les liens */
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 1px;
            background: var(--sakura);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover { color: #fff; text-shadow: 0 0 8px var(--sakura); }
        .nav-item:hover::after { width: 100%; }

        /* Statut à droite */
        .nav-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron';
            font-size: 0.6rem;
            color: var(--cyber);
            background: rgba(0, 210, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 210, 255, 0.1);
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--cyber);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyber);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            .nav-container { padding: 0 15px; }
            .nav-links { gap: 15px; }
            .nav-item { font-size: 0.65rem; letter-spacing: 1px; }
            .nav-logo span, .nav-status { display: none; } /* On cache pour gagner de la place */
        }

        /* IMPORTANT : Ajoute ceci pour que le contenu ne passe pas SOUS la navbar */
        body {
            padding-top: 90px;
        }

        :root {
            --bg: #020305;
            --sakura: #FFB7C5;
            --cyber: #00D2FF;
            --founder: #bb86fc;
            --owner: #ff4444;
            --coowner: #ffa333;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 80px 20px;
            overflow-x: hidden;
        }

        /* --- BACKGROUND TECH --- */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.5) 51%);
            background-size: 100% 4px; z-index: 10; pointer-events: none; opacity: 0.1;
        }

        /*
        .back-home {

        /* LE NOUVEAU BOUTON RETOUR */
        .back-home {
            position: fixed; top: 25px; left: 25px; z-index: 1000;
            text-decoration: none; color: var(--sakura); font-family: 'Orbitron';
            font-size: 0.7rem; letter-spacing: 2px;
            padding: 10px 20px; border: 1px solid rgba(255,183,197,0.2);
            border-radius: 50px; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); transition: 0.4s;
            display: flex; align-items: center; gap: 10px;
        }
        .back-home:hover {
            background: var(--sakura); color: #000;
            box-shadow: 0 0 20px var(--sakura); transform: scale(1.05);
        }

        /* RESPONSIVE TEAM */
        @media (max-width: 768px) {
            header { margin-top: 60px; margin-bottom: 40px; }
            h1 { font-size: 1.8rem; }
            .team-container { 
                grid-template-columns: 1fr; /* Une seule colonne sur mobile */
                padding: 10px;
            }
            .back-home { top: 15px; left: 15px; padding: 8px 15px; }
        }

        header { text-align: center; margin-bottom: 80px; }
        h1 { font-family: 'Orbitron'; font-size: 3rem; letter-spacing: 10px; margin-bottom: 10px; }
        .system-status { font-family: 'Orbitron'; color: var(--cyber); font-size: 0.8rem; letter-spacing: 3px; }

        .team-container {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .member-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .member-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 183, 197, 0.05);
            border-color: var(--sakura);
        }

        /* --- NOUVEAU DESIGN AVATAR --- */
        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover; /* Important pour ne pas déformer l'image */
            border: 2px solid transparent;
            position: relative;
            z-index: 2;
        }

        /* Le halo lumineux derrière l'image */
        .avatar-glow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.4;
            z-index: 1;
            transition: 0.3s;
        }

        /* Couleurs spécifiques par rôle */
        .role-founder .avatar-img { border-color: var(--founder); }
        .role-founder .avatar-glow { background: var(--founder); box-shadow: 0 0 20px var(--founder); }

        .role-owner .avatar-img { border-color: var(--owner); }
        .role-owner .avatar-glow { background: var(--owner); box-shadow: 0 0 20px var(--owner); }

        .role-coowner .avatar-img { border-color: var(--coowner); }
        .role-coowner .avatar-glow { background: var(--coowner); box-shadow: 0 0 20px var(--coowner); }

        .name { display: block; font-family: 'Orbitron'; font-size: 1.1rem; margin-bottom: 5px; }
        .handle { display: block; font-size: 0.8rem; opacity: 0.4; margin-bottom: 15px; }

        .badge {
            display: inline-block; padding: 5px 15px; border-radius: 5px;
            font-size: 0.6rem; font-family: 'Orbitron'; font-weight: 900;
            background: rgba(255,255,255,0.05);
        }
