<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="https://cdn.discordapp.com/avatars/924611566148665346/baa8187f57979991d38812e415d41191.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Selfbot | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06080a;
            --sakura: #FFB7C5;
            --cyber: #00D2FF;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* On bloque le scroll pour la home pure */
        }

        /* --- FOND DYNAMIQUE --- */
        #canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255, 183, 197, 0.05) 0%, transparent 70%);
            z-index: 2;
        }

        /* --- CONFIGURATION NAVBAR --- */
        .main-nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 70px;
            background: rgba(2, 3, 5, 0.85); /* Fond sombre semi-transparent */
            backdrop-filter: blur(12px);    /* Effet de flou derrière la barre */
            border-bottom: 1px solid rgba(255, 183, 197, 0.15);
            z-index: 10000;
            display: flex;
            align-items: center;
        }

        .nav-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Orbitron', sans-serif;
            color: var(--sakura);
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .nav-logo img {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--sakura);
            box-shadow: 0 0 10px rgba(255, 183, 197, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 35px;
        }

        .nav-item {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            transition: 0.3s;
            position: relative;
            padding: 5px 0;
        }

        /* Animation du trait sous les liens */
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 1px;
            background: var(--sakura);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover { color: #fff; text-shadow: 0 0 8px var(--sakura); }
        .nav-item:hover::after { width: 100%; }

        /* Statut à droite */
        .nav-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron';
            font-size: 0.6rem;
            color: var(--cyber);
            background: rgba(0, 210, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 210, 255, 0.1);
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--cyber);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyber);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            .nav-container { padding: 0 15px; }
            .nav-links { gap: 15px; }
            .nav-item { font-size: 0.65rem; letter-spacing: 1px; }
            .nav-logo span, .nav-status { display: none; } /* On cache pour gagner de la place */
        }

        /* IMPORTANT : Ajoute ceci pour que le contenu ne passe pas SOUS la navbar */
        body {
            padding-top: 90px;
        }


        /* --- HERO CONTENT --- */
        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            letter-spacing: 15px;
            position: relative;
            background: linear-gradient(180deg, #fff 30%, var(--sakura) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* Lueur derrière le titre */
        .title-aura {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--sakura);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            color: var(--cyber);
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        .cta-button {
            position: relative;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--sakura);
            color: var(--sakura);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
            font-size: 0.9rem;
            overflow: hidden;
            transition: 0.4s;
            cursor: pointer;
        }

        .cta-button:hover {
            background: var(--sakura);
            color: var(--bg);
            box-shadow: 0 0 30px var(--sakura);
        }

        /* --- EFFET DE SCANLINE --- */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 210, 255, 0.1);
            position: absolute;
            z-index: 5;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* MISE À JOUR RESPONSIVE */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; letter-spacing: 5px; }
            .hero-subtitle { font-size: 0.8rem; }
            .grid-container { grid-template-columns: 1fr; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>
    <div class="overlay"></div>
    <canvas id="canvas"></canvas>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://media.discordapp.net/attachments/1471802202925301831/1475232398768738464/sakura_sb.png?ex=699cbcbc&is=699b6b3c&hm=6d3b40a8421b13baded7da117835ca8ea1e6a0ba98aac50fcd23f22cdc5a5264&=&format=webp&quality=lossless" alt="Logo">
                <span>SAKURA SB</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-item">HOME</a>
                <a href="commands.html" class="nav-item">COMMANDS</a>
                <a href="login.html" class="nav-item">LOGIN</a>
                <a href="team.html" class="nav-item">TEAM</a>
            </div>
            <div class="nav-status">
                <div class="status-dot"></div>
                <span>V2.0 ONLINE</span>
            </div>
        </div>
    </nav>
    
    <div class="hero">
        <div class="title-aura"></div>
        <h1 class="main-title">SAKURA</h1>
        <p class="subtitle">Next-Gen Selfbot Interface</p>
        <a href="login.html" class="cta-button">INITIALISER LE SYSTÈME</a>
    </div>


    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.color = Math.random() > 0.8 ? '#00D2FF' : '#FFB7C5';
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) this.y = -10;
            }
        }

        for (let i = 0; i < 150; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
